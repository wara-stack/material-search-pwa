<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Search</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Material Search</h1>

    <div id="status">
        No Database Loaded
    </div>

    <br>

    <input
        type="file"
        id="dbFile"
        accept=".db,.sqlite"
    >

    <button onclick="loadDatabase()">
        Load Database
    </button>

    <button onclick="clearDatabase()">
        Reset Database
    </button>

    <hr>

    <h3>Search Materials</h3>

    <input
        type="text"
        id="searchText"
        placeholder="Enter Material Code or Description"
        autocomplete="off"
    >

    <button onclick="searchCode()">
        Search Code
    </button>

    <button onclick="searchDescription()">
        Search Description
    </button>

    <p>
        <b>Search Code:</b> Finds matching material codes.<br>
        <b>Search Description:</b> Searches Short Description and Long Description (word order does not matter).
    </p>

    <hr>

    <div id="results"></div>

    <script src="sql-wasm.js"></script>
    <script src="app.js"></script>

</body>
</html>
